<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Party</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0D0D0D;
      --surface:      #161616;
      --surface-2:    #1E1E1E;
      --border:       #2A2A2A;
      --text:         #E8E8E8;
      --text-muted:   #666666;
      --accent:       #6C63FF;
      --accent-hover: #5A52E0;
      --danger:       #EF4444;
      --radius-sm:    8px;
      --radius-lg:    20px;
      --radius-pill:  9999px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── JOIN SCREEN ───────────────────────────────────────────────────── */
    #join-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 420px;
    }

    .join-logo    { text-align: center; font-size: 52px; margin-bottom: 16px; }
    .join-title   { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .join-subtitle{ text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent); }

    .btn-join {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 16px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.15s;
    }
    .btn-join:hover  { background: var(--accent-hover); }
    .btn-join:active { transform: scale(0.98); }

    /* ── PLAYER SCREEN ─────────────────────────────────────────────────── */
    #player-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      height: 52px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .topbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .badge {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }

    #room-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    #host-badge {
      display: none;
      background: rgba(234,179,8,.12);
      border: 1px solid rgba(234,179,8,.35);
      color: #EAB308;
    }

    #reconnect-badge {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      color: var(--danger);
    }

    #viewer-count { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    #video-container {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-width: 0;
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Statut vidéo : chargement / erreur / placeholder */
    #video-status {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
      pointer-events: none;
    }
    #video-status.visible { display: flex; pointer-events: auto; }

    .vstatus-icon  { font-size: 48px; }
    .vstatus-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .vstatus-sub   { font-size: 13px; color: var(--text-muted); max-width: 340px; line-height: 1.5; }
    .vstatus-pill  {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .vstatus-pills { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .vstatus-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #chat-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      height: 52px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-weight: 600;
      font-size: 14px;
      gap: 6px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-system {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      font-style: italic;
      padding: 3px 0;
    }

    .msg-chat { font-size: 13px; line-height: 1.45; }

    .msg-time { color: var(--text-muted); font-size: 11px; margin-right: 4px; }
    .msg-name { font-weight: 600; color: var(--accent); margin-right: 4px; }
    .msg-text { color: var(--text); word-break: break-word; }

    #chat-input-area {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    #chat-input {
      flex: 1;
      min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
    }
    #chat-input::placeholder { color: var(--text-muted); }
    #chat-input:focus { border-color: var(--accent); }

    #chat-send {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #chat-send:hover { background: var(--accent-hover); }

    /* ── OVERLAY "TAP TO START" ────────────────────────────────────────── */
    #play-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.82);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #overlay-btn {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 12px;
      padding: 20px 52px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 40px rgba(0,0,0,.55);
      transition: transform 0.1s;
    }
    #overlay-btn:hover  { transform: scale(1.03); }
    #overlay-btn:active { transform: scale(0.97); }

    /* ── RESPONSIVE ────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #main-area { flex-direction: column; }
      #chat-panel {
        width: 100%;
        height: 280px;
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>

  <!-- ── JOIN SCREEN ──────────────────────────────────────────────────── -->
  <div id="join-screen">
    <div class="join-card">
      <div class="join-logo">🎬</div>
      <h1 class="join-title">Watch Party</h1>
      <p class="join-subtitle">Regardez des vidéos ensemble en temps réel</p>

      <div class="form-group">
        <label class="form-label" for="input-name">Ton nom</label>
        <input id="input-name" class="form-input" type="text"
               placeholder="Viewer" maxlength="30" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label" for="input-room">ID de la room</label>
        <input id="input-room" class="form-input" type="text"
               placeholder="room-1" maxlength="50" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label" for="input-url">URL de la vidéo</label>
        <input id="input-url" class="form-input" type="url"
               placeholder="https://…" autocomplete="off" />
      </div>

      <button class="btn-join" onclick="joinParty()">Rejoindre la party 🎉</button>
    </div>
  </div>

  <!-- ── PLAYER SCREEN ────────────────────────────────────────────────── -->
  <div id="player-screen">

    <div id="topbar">
      <div class="topbar-left">
        <span id="room-badge"      class="badge">🎬 room</span>
        <span id="host-badge"      class="badge">👑 Host</span>
        <span id="reconnect-badge" class="badge">⚠️ Reconnecting…</span>
      </div>
      <span id="viewer-count">👥 1</span>
    </div>

    <div id="main-area">
      <div id="video-container">
        <video id="video" controls preload="auto"></video>

        <!-- Statut : affiché par le JS selon l'état de la vidéo -->
        <div id="video-status" class="visible">
          <div class="vstatus-icon">🎬</div>
          <div class="vstatus-title">En attente d'une vidéo</div>
          <div class="vstatus-sub">
            Entre l'ID de la room, ton nom et un lien vidéo, puis clique sur
            <strong>Rejoindre la party</strong>.
          </div>
          <div class="vstatus-sub">Formats supportés :</div>
          <div class="vstatus-pills">
            <span class="vstatus-pill">.mp4</span>
            <span class="vstatus-pill">.webm</span>
            <span class="vstatus-pill">.ogg</span>
            <span class="vstatus-pill">.m3u8</span>
          </div>
        </div>
      </div>

      <div id="chat-panel">
        <div id="chat-header">💬 Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <input id="chat-input" type="text"
                 placeholder="Envoyer un message…" maxlength="300" autocomplete="off" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── OVERLAY TAP TO PLAY ──────────────────────────────────────────── -->
  <div id="play-overlay">
    <button id="overlay-btn">▶ Tap to start</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  /* ══════════════════════════════════════════════════════════════════════
     WatchPartySync — moteur de synchronisation
     8 bugs corrigés :
       1. Echo loop       → _isApplyingRemote flag + setTimeout 150ms
       2. Joiner en retard → getProjectedPosition + compensation sentAt
       3. Buffering pausé  → guards seeking + readyState < HAVE_FUTURE_DATA
       4. Autoplay bloqué  → await play() + catch NotAllowedError + overlay
       5. AudioContext mort → resume sur geste utilisateur
       6. Hard-seek dérive → soft playbackRate si drift < 2s
       7. Race seek + play → await 'seeked' avant play/pause
       8. Guest pause ignoré → aucun guard isHost dans les listeners
  ══════════════════════════════════════════════════════════════════════ */
  class WatchPartySync {
    constructor({ videoEl, socket, roomId }) {
      this.video  = videoEl;
      this.socket = socket;
      this.roomId = roomId;

      this._isApplyingRemote = false;
      this._isHost           = false;
      this._pendingPlay      = false;
      this._driftTimer       = null;
      this._rateResetTimer   = null;
      this._seekDebounce     = null;
      this._boundGesture     = this._onUserGesture.bind(this);

      this._setupVideoListeners();
      this._setupSocketListeners();
      this._setupDriftCorrection();
      this._setupGestureListener();
    }

    /* ── VIDEO → SERVEUR ─────────────────────────────────────────────── */

    _setupVideoListeners() {
      const v = this.video;

      v.addEventListener('play', () => {
        if (this._isApplyingRemote) return;            // Bug 1
        this.socket.emit('play', { roomId: this.roomId, position: v.currentTime });
      });

      v.addEventListener('pause', () => {
        if (this._isApplyingRemote) return;            // Bug 1
        if (v.seeking) return;                         // Bug 3 — seek en cours
        if (v.readyState < HTMLMediaElement.HAVE_FUTURE_DATA) return; // Bug 3 — buffering
        // Bug 8 : pas de guard isHost — tout le monde peut pauser
        this.socket.emit('pause', { roomId: this.roomId, position: v.currentTime });
      });

      v.addEventListener('seeked', () => {
        if (this._isApplyingRemote) return;            // Bug 1 — supprime les seeks distants
        clearTimeout(this._seekDebounce);
        this._seekDebounce = setTimeout(() => {
          // Bug 8 : pas de guard isHost — tout le monde peut seeker
          this.socket.emit('seek', {
            roomId:    this.roomId,
            position:  v.currentTime,
            isPlaying: !v.paused,
          });
        }, 100);
      });
    }

    /* ── SERVEUR → VIDEO ─────────────────────────────────────────────── */

    _setupSocketListeners() {
      this.socket.on('sync', ({ isPlaying, position, sentAt, isHost }) => {
        this._isHost = isHost;
        const latency = (Date.now() - sentAt) / 1000;           // Bug 2
        this._apply({ isPlaying, position: isPlaying ? position + latency : position });
      });

      this.socket.on('play', ({ position, sentAt }) => {
        const latency = (Date.now() - sentAt) / 1000;           // Bug 2
        this._apply({ isPlaying: true, position: position + latency });
      });

      this.socket.on('pause', ({ position }) => {
        // Pas de compensation sur pause — une position pausée ne dérive pas
        this._apply({ isPlaying: false, position });
      });

      this.socket.on('seek', ({ position, isPlaying, sentAt }) => {
        const latency = isPlaying ? (Date.now() - sentAt) / 1000 : 0;
        this._apply({ isPlaying, position: position + latency });
      });

      this.socket.on('you_are_host', () => { this._isHost = true; });

      // Correction de dérive périodique (Bug 6)
      this.socket.on('sync_tick', ({ isPlaying, position, sentAt }) => {
        if (this._isHost || this._isApplyingRemote) return;
        if (this.video.paused && !isPlaying) return;

        const latency = (Date.now() - sentAt) / 1000;
        const target  = isPlaying ? position + latency : position;
        const drift   = this.video.currentTime - target;

        if (Math.abs(drift) < 0.3) return;           // < 300ms : parfait

        if (Math.abs(drift) < 2.0) {
          // 300ms–2s : ajuster la vitesse, sans seek (pas de flush buffer)
          clearTimeout(this._rateResetTimer);
          this.video.playbackRate = drift > 0 ? 0.92 : 1.08;
          this._rateResetTimer = setTimeout(() => { this.video.playbackRate = 1.0; }, 3000);
        } else {
          // > 2s : seek dur acceptable
          this._apply({ isPlaying, position: target });
        }
      });
    }

    /* ── APPLICATION ATOMIQUE AVEC SUPPRESSION ───────────────────────── */

    async _apply({ isPlaying, position }) {
      const v = this.video;
      this._isApplyingRemote = true;  // 🔒 LOCK

      try {
        // Bug 7 — attendre les métadonnées si la vidéo n'est pas encore prête
        if (v.readyState < HTMLMediaElement.HAVE_METADATA) {
          await new Promise(resolve => {
            v.addEventListener('loadedmetadata', resolve, { once: true });
            setTimeout(resolve, 5000);
          });
        }

        // Bug 7 — seeker si nécessaire
        if (Math.abs(v.currentTime - position) > 0.5) {
          v.currentTime = position;
          // Attendre 'seeked' AVANT de toucher play/pause (Bug 7)
          await new Promise(resolve => {
            v.addEventListener('seeked', resolve, { once: true });
            setTimeout(resolve, 800);
          });
        }

        // Bug 7 — seulement maintenant, appliquer play/pause
        if (isPlaying && v.paused) {
          try {
            await v.play();                           // Bug 4 — toujours await
          } catch (err) {
            if (err.name === 'NotAllowedError') {     // Bug 4 — autoplay bloqué
              this._pendingPlay = true;
              this._showOverlay();
            }
          }
        } else if (!isPlaying && !v.paused) {
          v.pause();
        }

      } catch (err) {
        console.warn('[Sync] _apply:', err);
      } finally {
        // Bug 1 — délai 150ms pour laisser les events du player se vider
        setTimeout(() => { this._isApplyingRemote = false; }, 150);
      }
    }

    /* ── CORRECTION DE DÉRIVE ────────────────────────────────────────── */

    _setupDriftCorrection() {
      this._driftTimer = setInterval(() => {
        if (this._isHost || this.video.paused || this._isApplyingRemote) return;
        this.socket.emit('request_sync', { roomId: this.roomId });
      }, 5000);
    }

    /* ── GESTE UTILISATEUR ───────────────────────────────────────────── */

    _setupGestureListener() {
      ['click', 'keydown', 'touchstart'].forEach(e =>
        document.addEventListener(e, this._boundGesture, { passive: true })
      );
    }

    _onUserGesture() {
      // Bug 4 : retry play() si autoplay avait été bloqué
      if (this._pendingPlay) {
        this._pendingPlay      = false;
        this._isApplyingRemote = true;
        this.video.play()
          .catch(() => {})
          .finally(() => setTimeout(() => { this._isApplyingRemote = false; }, 150));
      }
      // Bug 5 : réveiller l'AudioContext si suspendu
      if (window.__watchPartyAudioCtx?.state === 'suspended') {
        window.__watchPartyAudioCtx.resume().catch(() => {});
      }
    }

    _showOverlay() {
      document.getElementById('play-overlay').style.display = 'flex';
    }

    /* ── NETTOYAGE ───────────────────────────────────────────────────── */

    destroy() {
      clearInterval(this._driftTimer);
      clearTimeout(this._rateResetTimer);
      clearTimeout(this._seekDebounce);
      ['sync', 'play', 'pause', 'seek', 'you_are_host', 'sync_tick']
        .forEach(e => this.socket.off(e));
      ['click', 'keydown', 'touchstart']
        .forEach(e => document.removeEventListener(e, this._boundGesture));
    }
  }

  /* ══════════════════════════════════════════════════════════════════════
     APP WIRING
  ══════════════════════════════════════════════════════════════════════ */

  let sync   = null;
  let socket = null;

  // Enter depuis n'importe quel champ du formulaire lance joinParty()
  ['input-name', 'input-room', 'input-url'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') joinParty();
    })
  );

  function joinParty() {
    const name   = (document.getElementById('input-name').value.trim() || 'Viewer').slice(0, 30);
    const roomId =  document.getElementById('input-room').value.trim() || 'room-1';
    const url    =  document.getElementById('input-url').value.trim();

    if (!url) { alert('Entre une URL de vidéo.'); return; }

    // Charger la vidéo
    const video  = document.getElementById('video');
    const status = document.getElementById('video-status');

    function setStatus(icon, title, sub, pills = []) {
      status.innerHTML =
        `<div class="vstatus-icon">${icon}</div>` +
        `<div class="vstatus-title">${title}</div>` +
        (sub ? `<div class="vstatus-sub">${sub}</div>` : '') +
        (pills.length
          ? `<div class="vstatus-pills">${pills.map(p => `<span class="vstatus-pill">${p}</span>`).join('')}</div>`
          : '');
      status.classList.add('visible');
    }

    function setStatusLoading() {
      status.innerHTML =
        '<div class="vstatus-spinner"></div>' +
        '<div class="vstatus-title">Chargement…</div>';
      status.classList.add('visible');
    }

    function hideStatus() { status.classList.remove('visible'); }

    // Feedback état vidéo
    video.addEventListener('loadstart', setStatusLoading);

    video.addEventListener('canplay', hideStatus);

    video.addEventListener('error', () => {
      const code = video.error?.code;
      if (code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) {
        setStatus('🚫', 'Format non supporté',
          'Ce lien ne peut pas être lu directement par le navigateur.<br>' +
          'YouTube, Vimeo, Twitch… ne sont <strong>pas supportés</strong>.<br>' +
          'Utilise un lien vidéo direct :',
          ['.mp4', '.webm', '.ogg', '.m3u8']);
      } else if (code === MediaError.MEDIA_ERR_NETWORK) {
        setStatus('📡', 'Erreur réseau',
          'Impossible d\'accéder à la vidéo. Vérifie que le lien est public et accessible.');
      } else {
        setStatus('⚠️', 'Impossible de charger la vidéo',
          'Vérifie que le lien est un fichier vidéo direct (pas YouTube, pas Vimeo).<br>' +
          'Exemple : <code style="color:var(--accent)">https://example.com/video.mp4</code>');
      }
    });

    // Afficher l'écran player
    document.getElementById('join-screen').style.display   = 'none';
    document.getElementById('player-screen').style.display = 'flex';
    document.getElementById('room-badge').textContent       = '🎬 ' + roomId;

    // Lancer le chargement
    video.src = url;

    // Socket + sync manager
    socket = io();
    sync   = new WatchPartySync({ videoEl: video, socket, roomId });

    // Rejoindre au connect (initial + après reconnexion)
    let connected = false;
    socket.on('connect', () => {
      socket.emit('join', { roomId });
      if (connected) {
        document.getElementById('reconnect-badge').style.display = 'none';
        addMessage({ type: 'system', msg: '✅ Reconnecté.' });
      }
      connected = true;
    });

    socket.on('disconnect', () => {
      document.getElementById('reconnect-badge').style.display = 'inline-flex';
      addMessage({ type: 'system', msg: 'Connexion perdue, reconnexion…' });
    });

    // Badge host — déclenché par you_are_host ET par le champ isHost du sync initial
    socket.on('you_are_host', () => {
      sync._isHost = true;
      document.getElementById('host-badge').style.display = 'inline-flex';
    });
    socket.on('sync', ({ isHost }) => {
      document.getElementById('host-badge').style.display = isHost ? 'inline-flex' : 'none';
    });

    // Nombre de spectateurs
    socket.on('viewer_count', ({ count }) => {
      document.getElementById('viewer-count').textContent = '👥 ' + count;
    });

    // Messages système (promotion host…)
    socket.on('system_msg', ({ msg }) => addMessage({ type: 'system', msg }));

    // Chat entrant
    socket.on('chat', ({ name, msg, time }) => addMessage({ type: 'chat', name, msg, time }));

    // Overlay : clic → cacher + retry play
    document.getElementById('overlay-btn').addEventListener('click', () => {
      document.getElementById('play-overlay').style.display = 'none';
      sync._onUserGesture();
      video.play().catch(() => {});
    });

    // Chat sortant
    const sendChat = () => {
      const input = document.getElementById('chat-input');
      const msg   = input.value.trim();
      if (!msg) return;
      socket.emit('chat', { roomId, name, msg });
      input.value = '';
    };
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendChat();
    });
  }

  /* ── Helpers chat ────────────────────────────────────────────────── */

  function addMessage({ type, name, msg, time }) {
    const box          = document.getElementById('chat-messages');
    const wasAtBottom  = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
    const el           = document.createElement('div');
    el.className       = type === 'system' ? 'msg-system' : 'msg-chat';

    if (type === 'system') {
      el.textContent = msg;
    } else {
      el.innerHTML =
        `<span class="msg-time">${esc(time)}</span>` +
        `<span class="msg-name">${esc(name)}</span>` +
        `<span class="msg-text">${esc(msg)}</span>`;
    }

    box.appendChild(el);
    if (wasAtBottom) box.scrollTop = box.scrollHeight; // auto-scroll intelligent
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  </script>
</body>
</html>
